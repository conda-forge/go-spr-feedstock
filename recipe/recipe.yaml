schema_version: 1

context:
  version: "0.16.2"

package:
  name: go-spr
  version: ${{ version }}

source:
  url: https://github.com/ejoffe/spr/archive/v${{ version }}.tar.gz
  sha256: f9c132d50d78eb81232250c5fcd553e3bb2434554b0397dc3d4fd70dbbdfa0a9

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses
  run:
    - git

tests:
  - script:
      - if: linux
        then: spr 2>&1 | grep -q "No GitHub OAuth token found!"
      - if: osx or win
        then: 'spr 2>&1 | grep -q "git error: fatal: not a git repository"'

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files_amend/
    - license-files_reword/
    - license-files_spr/
  summary: Stacked Pull Requests on GitHub
  homepage: https://github.com/ejoffe/spr
  repository: https://github.com/ejoffe/spr

extra:
  recipe-maintainers:
    - danielnachun
